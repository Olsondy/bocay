server {
    listen 80;
    server_name techwork.cloud www.techwork.cloud;
    return 301 https://techwork.cloud$request_uri;
}

server {
    listen 443 ssl;
    server_name www.techwork.cloud;

    include /usr/local/nginx/conf/conf.d/ssl.conf;
    include /usr/local/nginx/conf/conf.d/ssl.wildcard.techwork.cloud.conf;

    return 301 https://techwork.cloud$request_uri;
}


server {
    listen       443 ssl;
    server_name  techwork.cloud;
    
    include /usr/local/nginx/conf/conf.d/ssl.conf;
    include /usr/local/nginx/conf/conf.d/ssl.techwork.cloud.conf;

    location / {
        access_log /usr/local/nginx/logs/memos_access.log;
        error_log /usr/local/nginx/logs/memos_garage_error.log;
        proxy_pass http://127.0.0.1:3230;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Host $host;
        proxy_connect_timeout   180;
        proxy_send_timeout      180;
        proxy_read_timeout      180;
     #  proxy_buffer_size       128k;
     #  proxy_buffers           4 128k;
        proxy_buffer_size       10m;
        proxy_buffers           4 10m;

        proxy_busy_buffers_size 10m;
        proxy_temp_file_write_size 10m;
        add_header  Nginx-Cache "$upstream_cache_status";
        client_max_body_size 500M;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   html;
    }
}
