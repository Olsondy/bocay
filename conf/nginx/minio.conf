upstream minio {
    server   121.4.24.244:9190 weight=1;
}

server {
    listen       443 ssl;
    server_name  storage.techwork.cloud;
    ssl_certificate      "/usr/local/nginx/ssl/storage.techwork.cloud_bundle.pem";
    ssl_certificate_key  "/usr/local/nginx/ssl/storage.techwork.cloud.key";

    ssl_session_cache    shared:SSL:10m;
    ssl_session_timeout  10m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;

    ssl_ciphers  HIGH:!RC4:!MD5:!aNULL:!eNULL:!NULL:!DH:!EDH:!EXP:+MEDIUM;
    ssl_prefer_server_ciphers  on;

   location / {
        access_log /usr/local/nginx/logs/minio-acc.log;
        error_log /usr/local/nginx/logs/minio.log;
        proxy_pass http://minio;
        # websocket
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_connect_timeout   180;
        proxy_send_timeout      180;
        proxy_read_timeout      180;
     #  proxy_buffer_size       128k;
     #  proxy_buffers           4 128k;
        proxy_buffer_size       10m;
        proxy_buffers           4 10m;

        proxy_busy_buffers_size 10m;
        proxy_temp_file_write_size 10m;
        add_header  Nginx-Cache "$upstream_cache_status";
        client_max_body_size 100M;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   html;
    }
}
