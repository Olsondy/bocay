ssl_protocols        TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers  on;
ssl_ecdh_curve secp384r1:prime256v1;
ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305HIGH:!RC4:!MD5:!aNULL:!eNULL:!NULL:!DH:!EDH:!EXP:+MEDIUM';

ssl_session_cache    shared:SSL:10m;
ssl_session_timeout  10m;